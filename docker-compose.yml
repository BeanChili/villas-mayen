version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: villasmayen-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: villasmayen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicación Next.js
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: villasmayen-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/villasmayen?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: villas-mayen-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: